slug: "@mur/sentry-autofix"
display_name: Sentry Autofix Agent
category: error-tracking
recommended: true
status: shipping
install_test: skill-pack/scripts/install-tests/mur-sentry-autofix.test.ts
required_code:
  - service: src/services/webhooks/sentry.handler.ts
    exports: ["sentryAutofixHandler", "SENTRY_AUTOFIX_FLOW_SLUG", "renderAgentBrief"]
  - service: src/services/cofounderFlows/registry.ts
    exports: ["findCofounderFlow"]
wraps_tool: sentry-oss

mcp:
  endpoint: https://usemur.dev/mcp/mur-sentry-autofix
  http: https://usemur.dev/api/flows/mur-sentry-autofix/invoke

pricing:
  unit_price: "$1.00"
  unit: "per PR opened (no charge when the agent gives up — refund issued)"
  network: "base"
  trigger: "Sentry webhook on issue.created (no charge on dedup)"

detection:
  # Sentry-autofix REQUIRES Sentry to be in use — these signals are the
  # trigger to recommend, not a reason to skip. Hence they belong in
  # category_signals. presence_signals would skip the candidate entirely.
  category_signals:
    - has_tool: sentry-oss
    - gh_authed: true
    - has_keyword: ["sentry-sdk", "@sentry/", "Sentry.init"]
    - file_glob: "**/sentry.{client,server}.config.{ts,js}"
  presence_signals:
    # "Already installed" markers — the Mur GitHub App is already wired
    # to handle Sentry webhooks for this repo. None today; the install
    # endpoint dedupes via UserFlowInstall, so a second install is a
    # 409 anyway. Listed as empty so the schema check passes.
    []

reason_template: |
  You're tracking errors with Sentry. When a new issue fires, this flow
  hands the stack trace to a Claude coding agent that clones the repo,
  reads the offending code, proposes a fix, runs your tests, and opens
  a PR — authored by the Mur GitHub App. You only pay when a PR
  actually lands ($1.00). Hook up the Sentry webhook once; future
  issues fix themselves while you sleep.

self_host_alternative: null

alternatives:
  - "Sentry Autofix (managed, separate billing): https://sentry.io/for/autofix/"
  - "Manual triage + human PR"
