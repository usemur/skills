slug: "@mur/reviewer"
display_name: LLM PR Reviewer
category: llm-in-the-loop
recommended: true
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-reviewer
  http: https://usemur.dev/api/flows/mur-reviewer/invoke

pricing:
  unit_price: "$0.022"
  unit: "per PR"
  network: "base"
  trigger: "GitHub webhook on PR open / sync"

detection:
  category_signals:
    - active_git_repo: true
    - prs_per_week: ">=3"
    - missing: ci.review_bot
  presence_signals:
    - file_glob: ".github/workflows/codereview*"
    - file_glob: ".github/workflows/*review*.yml"
    - has_keyword: ["coderabbit", "graphite-review", "ellipsis"]

reason_template: |
  You merged {{prs_last_week}} PRs last week with no LLM review agent
  in the loop. On every PR open / sync, @mur/reviewer reads the diff,
  flags structural issues, SQL safety problems, missing tests, and
  posts a single PR comment with the findings. $0.022/PR — runs in
  under a minute.

self_host_alternative: null

alternatives:
  - "CodeRabbit (managed, separate billing)"
  - "Graphite Reviewer (managed, separate billing)"
  - "Ellipsis (managed, separate billing)"
