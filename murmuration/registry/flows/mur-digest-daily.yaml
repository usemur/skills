slug: "@mur/digest-daily"
display_name: Daily Digest
category: llm-in-the-loop
recommended: true
status: shipping
install_test: skill-pack/scripts/install-tests/mur-digest-daily.test.ts
required_code:
  - service: src/services/cofounder/digestOrchestrator.ts
    exports: ["runDigestForDeveloper", "formatNextRunLabel"]
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-digest-daily
  http: https://usemur.dev/api/flows/mur-digest-daily/invoke

pricing:
  unit_price: "varies"
  unit: "per digest"
  network: "base"
  schedule: "daily, default 6am local"
  notes: "Cost scales with the systems connected. ~$0.05/day for a small project (GitHub only); more when Linear / Stripe / Slack added."

detection:
  category_signals:
    - active_git_repo: true
    - has_manifest: true
  presence_signals:
    - file_glob: ".murmur/automations/digest-daily.json"
    - has_keyword: ["mur digest"]

reason_template: |
  Overnight, ranks every open issue, TODO, and PR across the systems
  you've connected, then surfaces the 3 things to look at first thing
  in the morning. With just GitHub: top issues + waiting PRs + diff
  weight. Connect Linear or Stripe and the digest finds cross-system
  threads — "PR #{{example_pr}} fixes the bug in issue #{{example_issue}}
  that blocks the customer in {{example_linear}}." When Stripe is
  connected the digest includes the revenue-pulse pillar (yesterday's
  charges + new customers); pair it with @mur/welcome-flow to email
  every new payer automatically. More systems = smarter digest.

self_host_alternative: null
