slug: "@mur/competitor-scan"
display_name: Competitor Site Scan
category: llm-in-the-loop
recommended: true
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-competitor-scan
  http: https://usemur.dev/api/flows/mur-competitor-scan/invoke

pricing:
  unit_price: "$0.02"
  unit: "per competitor per week"
  network: "base"
  schedule: "weekly, configurable"
  notes: "You provide the list of competitor URLs (homepage / pricing / changelog / blog). Flow scrapes, diffs against last week, LLM-summarizes what changed."

detection:
  category_signals:
    - active_git_repo: true
    - has_keyword: ["b2b", "saas", "platform", "tool", "product"]
  presence_signals:
    - file_glob: ".murmur/automations/competitor-scan.json"

reason_template: |
  You've got competitors. Once a week, this flow visits the URLs you
  give it (homepages, pricing pages, changelogs, blogs), diffs against
  last week's snapshot, and surfaces what changed in plain English —
  new feature ships, pricing moves, blog posts that signal strategy.
  Better than checking yourself, because you won't.

self_host_alternative: null
