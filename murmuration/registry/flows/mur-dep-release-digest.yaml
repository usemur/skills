slug: "@mur/dep-release-digest"
display_name: Dependency Release-Note Digest
category: llm-in-the-loop
recommended: true
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-dep-release-digest
  http: https://usemur.dev/api/flows/mur-dep-release-digest/invoke

pricing:
  unit_price: "$0.015"
  unit: "per weekly digest"
  network: "base"
  schedule: "weekly, default Monday 8am local"

detection:
  category_signals:
    - has_manifest: true
    - third_party_apis_count: ">=3"
  presence_signals:
    - file_glob: ".murmur/automations/dep-release-digest.json"

reason_template: |
  Every week, reads the release notes for the deps you actually use
  ({{dep_count}} packages in this project), summarizes what changed
  in the ones you skipped, and flags the breaking changes you should
  know about. The part you'd skim and forget — done for you.

self_host_alternative: null

alternatives:
  - "dependabot (free, but no LLM summary — just lists versions): https://github.com/dependabot"
  - "renovate (free, schedules PRs but no release-note synthesis): https://www.mend.io/renovate"
