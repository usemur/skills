slug: "@mur/dep-drift"
display_name: Dependency Drift Report
category: dependency-health
recommended: false  # superseded by @mur/dep-release-digest (LLM-summarized release notes, more useful). Browsable via /mur catalog.
status: deprecated
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-dep-drift
  http: https://usemur.dev/api/flows/mur-dep-drift/invoke

pricing:
  unit_price: "$0.015"
  unit: "per report"
  network: "base"
  schedule: "weekly"

detection:
  category_signals:
    - has_manifest: true
    - lockfile_age_days: ">30"
  presence_signals:
    - file_glob: ".github/dependabot.y*ml"
    - file_glob: "renovate.json*"
    - has_keyword: ["dependabot", "renovate"]

reason_template: |
  Your lockfile hasn't been touched in {{lockfile_age_days}} days and you
  have {{outdated_count}} packages with newer minors/majors available.
  Weekly report: what's behind, what's a security concern, what to bump first.

self_host_alternative: null
