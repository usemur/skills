slug: "@mur/twenty-deploy"
display_name: Twenty CRM Deploy
category: crm
recommended: false  # OSS-deploy isn't a focus right now; we want automation, not installation. Browsable via /mur catalog.
status: deprecated
wraps_tool: tools/twenty.yaml

mcp:
  endpoint: https://usemur.dev/mcp/mur-twenty-deploy
  http: https://usemur.dev/api/flows/mur-twenty-deploy/invoke

pricing:
  unit_price: "free"
  unit: "deploy on user infra"
  notes: "Deploy is free; the deployed Twenty instance runs on your cloud (Fly, Railway, Render, your VPS), so you pay only your cloud's hosting bill."

detection:
  category_signals:
    - product_category: b2b
    - product_category: sales
    - has_keyword: ["onboarding", "leads", "pipeline", "deals", "contacts"]
  presence_signals:
    - has_keyword: ["twenty", "hubspot", "salesforce", "pipedrive"]
    - file_glob: "**/twenty.config.*"

reason_template: |
  Deploys Twenty (OSS HubSpot alternative) to your Fly/Railway/Render org
  in one command. The flow takes a deploy token, runs the setup, and hands
  you back a working CRM URL. ~5 minutes start-to-finish.

self_host_alternative: tools/twenty.yaml
