slug: "@mur/prompt-regression"
display_name: Prompt Regression Eval
category: llm-in-the-loop
recommended: true
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-prompt-regression
  http: https://usemur.dev/api/flows/mur-prompt-regression/invoke

pricing:
  unit_price: "$0.04"
  unit: "per eval-run"
  network: "base"
  trigger: "GitHub webhook on PR open / sync, gated to PRs that touch prompt files"
  notes: "Each eval-run executes your test cases against the new prompt and the baseline; you pay for the LLM calls plus a small orchestration fee."

detection:
  category_signals:
    - llm_sdk_present: true
    - custom_prompts_detected: true
  presence_signals:
    - file_glob: "**/promptfoo.config.*"
    - file_glob: "**/evals/**"
    - has_keyword: ["promptfoo", "promptlayer eval", "anthropic eval"]

reason_template: |
  You have prompt strings in {{prompt_file_count}} files and no eval
  suite running on PRs that touch them. When a PR changes a prompt,
  this flow runs your eval cases against both the new and old prompts
  and posts the diff as a PR comment — pass-rate, latency, token
  delta. Catches regressions before merge.

self_host_alternative: null

alternatives:
  - "promptfoo (OSS, self-host on CI): https://github.com/promptfoo/promptfoo"
  - "Braintrust (managed, separate billing): https://braintrust.dev"
