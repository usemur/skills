slug: "@mur/langfuse-host"
display_name: Managed Langfuse
category: llm-observability
wraps_tool: tools/langfuse.yaml

mcp:
  endpoint: https://usemur.dev/mcp/mur-langfuse-host
  http: https://usemur.dev/api/flows/mur-langfuse-host/invoke

pricing:
  unit_price: "$0.003"
  unit: "per trace"
  network: "base"

detection:
  category_signals:
    - package_import: openai
    - package_import: "@anthropic-ai/sdk"
    - package_import: ai
    - package_import: langchain
    - package_import: llamaindex
  presence_signals:
    - package_import: langfuse
    - env_var_prefix: LANGFUSE_

reason_template: |
  Same outcome as self-hosting Langfuse, no infra to run. We host the
  collector + dashboard in our enclave, you keep your traces. Pay only
  for traces that land — no idle ingest cost, no DB tuning.

self_host_alternative: tools/langfuse.yaml
