slug: "@mur/issue-triage"
display_name: LLM Issue Triage
category: llm-in-the-loop
recommended: true
wraps_tool: null

mcp:
  endpoint: https://usemur.dev/mcp/mur-issue-triage
  http: https://usemur.dev/api/flows/mur-issue-triage/invoke

pricing:
  unit_price: "$0.008"
  unit: "per issue triaged"
  network: "base"
  trigger: "GitHub webhook on issue open"

detection:
  category_signals:
    - gh_authed: true
    - open_issues_count: ">=5"
  presence_signals:
    - file_glob: ".github/workflows/*triage*.yml"
    - has_keyword: ["issue triage bot", "auto-label"]

reason_template: |
  You have {{open_issues_count}} open issues in this repo. As new ones
  arrive, this flow reads the body, applies labels (bug / feature /
  question / regression / customer / p0–p3), cross-links to existing
  issues or PRs that look related, and posts a one-line triage comment.
  Saves the morning sweep — issues land already shaped.

self_host_alternative: null

alternatives:
  - "issue-labeler (OSS GH Action, regex-based, no LLM): https://github.com/github/issue-labeler"
