slug: "@mur/welcome-flow"
display_name: Customer Welcome Flow
category: llm-in-the-loop
recommended: true
status: shipping  # shipping | building | roadmap | deprecated — see plans/scan-recommender-honesty.md
install_test: skill-pack/scripts/install-tests/mur-welcome-flow.test.ts
required_code:
  - service: src/services/cofounderFlows/welcomeFlow.handler.ts
    exports: ["welcomeFlowHandler", "WELCOME_FLOW_SLUG"]
  - service: src/services/cofounderFlows/welcomeFlowSender.ts
    exports: ["sendWelcomeEmail"]
  - service: src/services/cofounder/pillars/_stripe.ts
    exports: ["stripePaginateExt"]
  - service: src/services/cofounderFlows/registry.ts
    exports: ["findCofounderFlow"]
wraps_tool: null

mcp:
  endpoint: null # cofounder flow — no MCP, runs server-side on cron
  http: null # no flow-invoke endpoint; setup goes through /api/welcome-flow/setup, see install.md

pricing:
  unit_price: "$0.20"
  unit: "per first-time payer emailed"
  network: "base"
  schedule: "daily, 03:00 local"
  notes: "One welcome email per first-time Stripe payer per project. Reply-To is your address; replies land in your normal inbox. Mur never reads them."

detection:
  category_signals:
    - has_connector: stripe
    - stripe_scopes:
        # The handler reads charge.succeeded events to detect first-time
        # payers. Without read access to events the cron run hits 401
        # every tick. Drop the candidate when scopes aren't granted —
        # render layer surfaces a re-auth teaser instead. (See
        # plans/scan-recommender-honesty.md §1 Leak C.)
        any_of: [read_events, read_charges]

reason_template: |
  Stripe is connected — every YC partner tells founders to email every
  new customer asking what they're building. Almost no one does it.
  This flow does it for you nightly: same short email you wrote once at
  setup, sent verbatim to every first-time payer, with you on Reply-To.
  Replies hit your inbox; you handle them like normal email. The point
  is the conversation, not the funnel.

self_host_alternative: null

alternatives:
  - "Loops (free tier covers most volumes; great UX): https://loops.so"
  - "Customer.io (more sophisticated automation, heavier setup): https://customer.io"
  - "Userlist (founder-friendly, B2B SaaS focus): https://userlist.com"
