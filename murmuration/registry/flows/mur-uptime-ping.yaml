slug: "@mur/uptime-ping"
display_name: Uptime Ping
category: uptime-monitoring
recommended: false  # uptime-kuma self-hosts free, Better Stack has a free tier; recommend.md points at OSS / free-tier instead. Browsable via /mur catalog.
wraps_tool: tools/uptime-kuma.yaml

mcp:
  endpoint: https://usemur.dev/mcp/mur-uptime-ping
  http: https://usemur.dev/api/flows/mur-uptime-ping/invoke

pricing:
  unit_price: "$0.001"
  unit: "per check"
  network: "base"
  schedule: "every 5 minutes"

detection:
  category_signals:
    - public_url_detected: true
    - missing: signals.uptime
  presence_signals:
    - package_import: uptime-kuma-api
    - env_var_prefix: KUMA_
    - file_glob: "**/uptime-kuma*"

reason_template: |
  Pings your public URL every 5 minutes from {{check_regions}}. Slack/email
  alert on the first failure, recovery confirmation when service is back.
  Status-code only — we don't read your URL contents.

self_host_alternative: tools/uptime-kuma.yaml
