name: Twenty
category: crm
homepage: https://twenty.com
source: https://github.com/twentyhq/twenty
license: AGPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, fly, kubernetes]
  link: https://twenty.com/developers/section/self-hosting

mur_flow:
  slug: "@mur/twenty-deploy"
  unit_price: "free"
  unit: "deploy on user infra"

detection:
  category_signals:
    - product_category: b2b
    - product_category: sales
    - has_keyword: ["onboarding", "leads", "pipeline", "deals", "contacts"]
  presence_signals:
    - has_keyword: ["twenty"]
    - file_glob: "**/twenty.config.*"

reason_template: |
  Your project looks B2B/sales-adjacent ({{product_keywords}}) and you don't
  have a CRM in the stack. Twenty is the open-source HubSpot alternative —
  contacts, companies, deals, GraphQL API. Deploys to your Fly org in 5min.

alternatives: [erpnext, espocrm, vtiger]
