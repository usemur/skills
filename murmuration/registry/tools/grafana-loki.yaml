name: Grafana Loki
category: logging
action_slot: logging
homepage: https://grafana.com/oss/loki
source: https://github.com/grafana/loki
license: AGPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, kubernetes, helm]
  link: https://grafana.com/docs/loki/latest/setup/install/

detection:
  category_signals:
    - deploy_kind: kubernetes
    - deploy_kind: docker-compose
    - missing: signals.logging
  presence_signals:
    - package_import: pino-loki
    - env_var_prefix: LOKI_
    - file_glob: "**/loki-config.y*ml"

reason_template: |
  You're already running on {{deploy_signals}} but logs aren't shipped to
  a queryable store. Loki is the canonical Grafana-stack answer — pairs
  cleanly with whatever you already log to (pino, winston, slog).

alternatives: [openobserve, datadog, victorialogs]
