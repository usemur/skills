name: Cal.com
category: scheduling
homepage: https://cal.com
source: https://github.com/calcom/cal.com
license: AGPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, vercel, fly]
  link: https://github.com/calcom/cal.com#self-hosting

detection:
  category_signals:
    - has_keyword: ["booking", "appointment", "schedule", "meeting", "calendar"]
  presence_signals:
    - has_keyword: ["calendly", "savvycal", "tidycal"]
    - env_var_prefix: CALCOM_
    - env_var_prefix: CAL_

reason_template: |
  Looks like {{matched_keywords}} are part of your product. Cal.com is the
  OSS Calendly alternative — bookings, round-robin, payments, group events.
  Self-host on Vercel or Fly, embed in your app.

alternatives: [calendly, savvycal, tidycal]
