name: ERPNext
category: erp
homepage: https://erpnext.com
source: https://github.com/frappe/erpnext
license: GPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, kubernetes, frappe-cloud]
  link: https://github.com/frappe/bench

detection:
  category_signals:
    - has_keyword: ["inventory", "warehouse", "manufacturing", "accounting", "payroll", "operations", "ops"]
  presence_signals:
    - has_keyword: ["sap", "netsuite", "odoo", "frappe"]
    - env_var_prefix: ERPNEXT_
    - env_var_prefix: FRAPPE_

reason_template: |
  Your project mentions {{matched_keywords}} — operational/back-office work.
  ERPNext is the OSS SAP/NetSuite alternative — accounting, inventory,
  manufacturing, HR. Heavy install, but covers most of an ops backoffice.

alternatives: [odoo, dolibarr, openboxes]
