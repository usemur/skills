name: Plane
category: project-mgmt
homepage: https://plane.so
source: https://github.com/makeplane/plane
license: AGPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, kubernetes]
  link: https://docs.plane.so/self-hosting/overview

detection:
  category_signals:
    - has_keyword: ["sprint", "ticket", "issue", "kanban", "backlog"]
    - team_size: ">1"
  presence_signals:
    - has_keyword: ["jira", "linear", "asana", "notion", "shortcut"]
    - file_glob: "**/plane.config.*"

reason_template: |
  No project-mgmt tool detected and your repo shows {{contributor_count}}
  contributors. Plane is the OSS Jira/Linear alternative — issues, sprints,
  pages, AI assist. Self-host on the same box as the rest of your infra.

alternatives: [linear, jira, github-projects, openproject]
