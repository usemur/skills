name: Documenso
category: e-sign
homepage: https://documenso.com
source: https://github.com/documenso/documenso
license: AGPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, vercel, fly]
  link: https://docs.documenso.com/developers/local-development

detection:
  category_signals:
    - has_keyword: ["contract", "agreement", "sign", "esign", "legal"]
  presence_signals:
    - has_keyword: ["docusign", "hellosign", "pandadoc"]
    - env_var_prefix: DOCUMENSO_

reason_template: |
  Your README mentions {{matched_keywords}} — contract/legal flows. Documenso
  is the OSS DocuSign alternative — open standards, audit trail, embeddable
  signature flow. Cheaper than DocuSign and your data stays put.

alternatives: [docusign, hellosign, pandadoc]
