name: Helicone
category: llm-observability
action_slot: observability
homepage: https://helicone.ai
source: https://github.com/Helicone/helicone
license: Apache-2.0
self_hostable: true

deploy:
  kinds: [docker-compose, kubernetes, fly]
  link: https://docs.helicone.ai/getting-started/self-host/overview

detection:
  category_signals:
    - package_import: openai
    - package_import: "@anthropic-ai/sdk"
    - package_import: ai
    - package_import: langchain
    - package_import: llamaindex
  presence_signals:
    - package_import: helicone
    - env_var_prefix: HELICONE_

reason_template: |
  You're calling {{llm_providers}} from {{llm_call_sites}} call sites without
  a tracing layer. Helicone is a proxy-based alternative to Langfuse — drop
  in via base URL, no SDK rewrites.

alternatives: [langfuse, langsmith, phoenix, braintrust]
