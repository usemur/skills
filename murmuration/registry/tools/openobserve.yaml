name: OpenObserve
category: logging
homepage: https://openobserve.ai
source: https://github.com/openobserve/openobserve
license: AGPL-3.0
self_hostable: true

deploy:
  kinds: [docker-compose, kubernetes, binary]
  link: https://openobserve.ai/docs/quickstart

detection:
  category_signals:
    - high_console_log_density: true
    - missing: signals.logging
  presence_signals:
    - package_import: "@openobserve/browser-rum"
    - env_var_prefix: O2_
    - env_var_prefix: OPENOBSERVE_

reason_template: |
  Your logs are going to stdout via {{logging_signals}} (or just `console.log`)
  with no shipping target. OpenObserve is a self-hostable Loki/Datadog
  alternative — Postgres-light, S3-backed, single binary.

alternatives: [grafana-loki, datadog, honeycomb]
