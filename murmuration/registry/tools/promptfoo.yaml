name: promptfoo
category: prompt-eval
action_slot: prompt-regression
homepage: https://promptfoo.dev
source: https://github.com/promptfoo/promptfoo
license: MIT
self_hostable: true

deploy:
  kinds: [cli, github-actions]
  link: https://www.promptfoo.dev/docs/getting-started/

mur_flow: null

detection:
  category_signals:
    - llm_sdk_present: true
    - custom_prompts_detected: true
  presence_signals:
    - file_glob: "**/promptfoo.config.*"
    - file_glob: "**/promptfooconfig.*"
    - file_glob: "**/evals/**"
    - has_keyword: ["promptfoo", "promptlayer eval", "anthropic eval", "braintrust eval"]

reason_template: |
  You have prompt strings in {{prompt_file_count}} files and no eval
  suite running on PRs that touch them. When you tweak a prompt,
  ~10% of the time you make a different case worse without noticing.
  promptfoo runs your test cases against the new and baseline prompts
  on every PR (via GitHub Actions) and posts pass-rate, latency, and
  token deltas as a comment. OSS, runs on your CI, your LLM keys.

alternatives: [braintrust, langfuse-experiments]
