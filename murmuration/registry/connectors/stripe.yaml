slug: stripe
name: Stripe
patterns:
  - manifest: package.json
    field: dependencies
    match: "^stripe$"
  - manifest: package.json
    field: devDependencies
    match: "^stripe$"
  - manifest: package.json
    field: dependencies
    match: "^@stripe/"
  - manifest: package.json
    field: devDependencies
    match: "^@stripe/"
  - manifest: requirements.txt
    match: "^stripe$"
  - manifest: pyproject.toml
    match: "^stripe$"
  - manifest: Pipfile
    match: "^stripe$"
  - manifest: Cargo.toml
    match: "^(async-stripe|stripe-rust|stripe)$"
  # SDK-less integrations (raw HTTP) — sniffed from config artifacts.
  - manifest: env-var
    match: "^STRIPE_(SECRET_KEY|PUBLISHABLE_KEY|WEBHOOK_SECRET|API_KEY|RESTRICTED_KEY)$"
  - manifest: host
    match: "^(api|js|checkout|connect|files|m)\\.stripe\\.com$"
