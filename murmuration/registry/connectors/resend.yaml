slug: resend
name: Resend
patterns:
  - manifest: package.json
    field: dependencies
    match: "^resend$"
  - manifest: package.json
    field: devDependencies
    match: "^resend$"
  - manifest: Cargo.toml
    match: "^(resend-rs|resend)$"
  # SDK-less integrations (raw HTTP) — sniffed from config artifacts.
  - manifest: env-var
    match: "^RESEND_(API_KEY|WEBHOOK_SECRET)$"
  - manifest: host
    match: "^api\\.resend\\.com$"
