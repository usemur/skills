# Mur Onboarding Heuristics
#
# A flow variant scores ≥ 2.5 average with no zeros and no "no" on
# binary heuristics 1, 2, 7 to be considered ship-quality.
#
# Used today by paper walkthroughs (humans hand-trace each persona
# through SKILL.md + prompts/scan.md + prompts/connect.md +
# prompts/digest.md, scoring as they go). The judge-prompt.md is
# staged for an automated runner once paper walking gets tedious.
#
# The arc being scored is upstream's canonical
# **scan → connect → digest** path (SKILL.md "Getting started"),
# starting from the first-contact welcome and ending after the Day-0
# backfill digest fires.
#
# Each heuristic is graded against a *transcript* of an onboarding run
# (real or simulated). The judge produces:
#   { id: 1, score: <"yes"|"no"|0|1|2|3>, evidence: "<quote or turn-ref>" }

heuristics:
  - id: 1
    short: "Decisions per turn ≤ 1"
    grading: binary
    description: |
      Each assistant turn presents at most one decision the user must
      make. A "decision" is a yes/no, pick-one-of-N, or paste-this-value.
      Bundling ("approve A and tell me about B") fails. Soft pivots that
      share information without asking ("I see you have Stripe —
      connecting Stripe first?") count as a single decision.
    score_yes_when: |
      Every turn surfaces 0 or 1 explicit ask. Implicit micro-asks
      ("type 'yes' to continue") count toward the cap. The first-contact
      welcome's "or type 'what else can you do?' for the verb list" is
      an escape hatch, not a second decision — still scores yes.
    score_no_when: |
      Any turn presents 2+ choices that aren't trivially-related. Note:
      first-contact Branch B (gstack missing) bundles "run /mur scan"
      AND "install gstack via this curl one-liner" — that's 2 distinct
      asks in one screen. Branch A (gstack present) is clean.

  - id: 2
    short: "Whole arc named upfront"
    grading: binary
    description: |
      The first-contact welcome turn names every phase the user is
      about to walk through, with rough time estimate. The user
      finishes turn 1 knowing the *shape* of the experience.
    score_yes_when: |
      The welcome screen names all three canonical phases — **scan,
      connect, digest** — and signals optionality. Both first-contact
      branches in upstream's SKILL.md do this.
    score_no_when: |
      Welcome only says "want me to scan?" without naming what comes
      after.

  - id: 3
    short: "Wow before ask"
    grading: 0-3
    description: |
      Ratio of "value demonstrated" to "asks made" before the first
      paid moment. The first paid moment in Mur is the digest's
      one-free-per-day fire (or any subsequent paid digest / install).
      Free wows that count: scan findings shown, connect bonus credit,
      app-sweep ("I noticed you have X"), Day-0 backfill briefing.
    score_3_when: |
      User sees ≥3 distinct value moments before any paid ask. In
      upstream's flow the natural wows are: first scan finding (Turn 3),
      bonus credit + app sweep (Turn 5), Day-0 briefing (Turn 6).
      Day-0 backfill is free, so paid asks come on day 2+.
    score_2_when: |
      ≥2 value moments before the first paid ask.
    score_1_when: |
      Exactly 1 value moment before the first paid ask.
    score_0_when: |
      Onboarding asks for a credit card / paid digest / install before
      showing any value.

  - id: 4
    short: "Consent is reversible somewhere obvious"
    grading: binary
    description: |
      Every consent the user grants during onboarding is reversible
      via a surface the user knows or can find easily. The web
      dashboard at usemur.dev counts. OAuth provider UIs (GitHub App
      revoke, Composio account revoke) count. Inline revoke prose in
      every prompt is NOT required — that's noise during onboarding.
    score_yes_when: |
      Scan writes `.murmur/consents.json` (user-editable). OAuth
      grants are revocable via usemur.dev/dashboard/vault and the
      provider's own UI. Paid digest mode bounds spend per-fire and
      per-day.
    score_no_when: |
      A consent is granted with no revocation path anywhere — local
      file, web dashboard, OR provider UI. (Should not happen in
      upstream's flow; flag if found.)

  - id: 5
    short: "Signal-to-suggestion specificity"
    grading: 0-3
    description: |
      Every surfaced item (scan finding, connect suggestion, digest
      pillar item) cites a concrete signal. "Generic match" = 0.
      "We saw <specific thing>" with the thing rendered = 3.
    score_3_when: |
      Every scan finding cites a file/commit/import. Connect suggestion
      names the specific app from scan output. Digest items "cite every
      claim" per digest.md hard contract.
    score_2_when: |
      Most items cite a signal; a few are generic.
    score_0_when: |
      Surfaced items don't cite any repo signal. (Should never happen
      in upstream's flow — `prompts/scan.md` "Cite every claim" is a
      hard contract.)

  - id: 6
    short: "Wow latency (turns to plan-of-action menu)"
    grading: 0-3
    description: |
      Number of turns from first-contact welcome to the
      plan-of-action menu being presented. Lower is better.
      Reframed (was: turns to digest fire) per the plan-of-action
      restructure — the menu IS the wow moment for connected users,
      not the digest. The digest is one option *inside* the menu.
    score_3_when: |
      Plan menu lands within 4 turns of the welcome. Welcome →
      scan-with-preview → connect → plan-fires = 4 turns. This is
      the post-restructure target.
    score_2_when: |
      5 turns to plan menu.
    score_1_when: |
      6 turns to plan menu (consent prompts not absorbed into
      welcome, or extra confirmations).
    score_0_when: |
      Plan menu doesn't fire (user dropped) or takes 7+ turns.
    note: |
      Pre-restructure: this heuristic measured turns to digest
      fire (H6=1 was the floor because digest required OAuth +
      90s backfill). Post-restructure: digest is one menu option,
      and the menu itself fires immediately after connect. New
      floor is H6=3 for the canonical arc.

  - id: 9
    short: "Plan-of-action breadth"
    grading: 0-3
    description: |
      When the plan menu fires, does it surface the major paths
      (security audit, automate, catalog, daily digest, gstack
      hand-off, publish) when their trigger conditions are met?
      A menu that only ever offers "Set up the daily digest" is
      worse than one that adapts to the user's stack.
    score_3_when: |
      All applicable paths surface — security-audit when scan
      finds payment + risky patterns, automate when recommend
      matches, catalog when stack opens up paid categories,
      digest always (for connected users), publish when
      outbound_candidates exist, gstack when hand-offs flagged.
    score_2_when: |
      Most applicable paths surface. 1–2 missing options that
      should have appeared.
    score_1_when: |
      Only digest + 1 other option surfaces. Menu feels narrow.
    score_0_when: |
      Only one option surfaces (typically the digest). Menu
      isn't earning its existence — could just auto-fire digest
      and skip the menu turn.
    note: |
      H9 measures whether the menu adapts to the user's actual
      stack vs. always presenting the same surface. A pre-product
      persona with no Stripe + no risky patterns should see
      "Publish a utility" + "Set up the daily digest" + "Run
      /office-hours" — NOT a menu padded with security-audit
      and automate items that don't apply.

  - id: 10
    short: "Plan-of-action grounding"
    grading: 0-3
    description: |
      Is each menu item cited with a specific signal that
      justifies it for THIS user? Generic recommendations
      ("you might want to set up monitoring") fail this; signal-
      grounded items ("Run security audit — you have Stripe
      wired AND 2 raw-SQL patterns in src/api/users.ts") pass.
      Mirrors H5 (per-item finding specificity) but applied at
      the plan level.
    score_3_when: |
      Every menu item names a file / PR / SDK / signal. The user
      can verify why the item appeared without leaving the menu.
    score_2_when: |
      Most items cite a signal. 1–2 items are generic
      ("Browse the catalog — useful for any stack").
    score_1_when: |
      Half the items are generic.
    score_0_when: |
      Most items are generic recommendations. Menu reads like
      a static feature list, not a curated plan.
    note: |
      H10 protects against the "plan menu becomes a static
      product menu" failure mode. The whole point of plan.md
      is that it's MORE specific than scan.md's priority sort
      (one finding) — it surfaces multiple findings, each
      grounded. If items are generic, the menu adds confusion
      without adding signal.

  - id: 7
    short: "Drop-off recoverability"
    grading: binary
    description: |
      If the user kills the session mid-onboarding, the next
      invocation can resume from the same step without losing state
      or re-asking already-answered questions.
    score_yes_when: |
      `.murmur/scan.json` carries the cursor for "what else?". State
      `~/.murmur/state.json` carries projectId. `.murmur/consents.json`
      carries scan + gh-probe consents. After a scan, "/mur" without
      a verb closes the loop with the next step (connect) rather than
      restarting onboarding.
    score_no_when: |
      Resume re-asks questions the user already answered, or skips to
      the wrong step. (In upstream's flow this would only happen if
      `.murmur/` got deleted between sessions.)

  - id: 8
    short: "Business recognition / chief-of-staff voice"
    grading: 0-3
    description: |
      Does Mur sound like a chief-of-staff who *gets* the user's
      business, or like a code parser? A chief-of-staff names the
      business shape (B2B SaaS / consumer / dev tool / utility
      script), references the stack signals (Stripe live, no LLM
      observability, Sentry deployed), and echoes that recognition
      across multiple turns. A code parser just lists what was
      detected.
    score_3_when: |
      Business shape named explicitly in scan output ("Looks like:
      B2B SaaS, Stripe live, ~12 PRs/week, Sentry deployed — past
      PMF and shipping fast"). Product summary echoed in connect's
      auto-fire surface line ("I can watch your Notion-clone for
      engineering teams now…"). Digest header includes product
      summary parenthetical. The user feels Mur synthesized
      something rather than parroting fields.
    score_2_when: |
      Business shape named once (e.g. in scan output) but not
      echoed in connect or digest. Or product summary echoed but
      no broader business profile composed.
    score_1_when: |
      Product summary only (one-line description), no business
      shape inferred. The user sees "Notion-clone with realtime
      collab" but no read on whether it's a side project or live
      product.
    score_0_when: |
      No business or product framing at all — just stack slot
      counts and findings. Mur sounds like a linter, not a
      cofounder.
    note: |
      H8 catches a failure mode H1–H7 miss: a flow can score well
      on per-turn discipline (one decision per turn, wow before ask)
      and per-item specificity (every finding grounded) while still
      feeling impersonal. H8 measures whether Mur sounds like a
      cofounder at the *flow* level, not just the item level.

      H5 is per-item ("does each finding cite a signal?"); H8 is
      per-flow ("does Mur sound like it gets the user's business?").
      A flow can score H5=3 and H8=1 — that's the gap H8 catches.

# Acceptance criteria
acceptance:
  ship_when: |
    For every canonical persona in evals/personas/:
    - Average score across all 10 heuristics ≥ 2.5
    - No heuristic scores 0
    - All binary heuristics (1, 2, 4, 7) score "yes"
    - Binary "yes" normalized as 3 for averaging
