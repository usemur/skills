# Mur Onboarding Heuristics
#
# A flow variant scores ≥ 2.5 average with no zeros and no "no" on
# binary heuristics 1, 2, 7 to be considered ship-quality.
#
# Used today by paper walkthroughs (humans hand-trace each persona
# through SKILL.md + prompts/scan.md + prompts/connect.md +
# prompts/digest.md, scoring as they go). The judge-prompt.md is
# staged for an automated runner once paper walking gets tedious.
#
# The arc being scored is upstream's canonical
# **scan → connect → digest** path (SKILL.md "Getting started"),
# starting from the first-contact welcome and ending after the Day-0
# backfill digest fires.
#
# Each heuristic is graded against a *transcript* of an onboarding run
# (real or simulated). The judge produces:
#   { id: 1, score: <"yes"|"no"|0|1|2|3>, evidence: "<quote or turn-ref>" }

heuristics:
  - id: 1
    short: "Decisions per turn ≤ 1"
    grading: binary
    description: |
      Each assistant turn presents at most one decision the user must
      make. A "decision" is a yes/no, pick-one-of-N, or paste-this-value.
      Bundling ("approve A and tell me about B") fails. Soft pivots that
      share information without asking ("I see you have Stripe —
      connecting Stripe first?") count as a single decision.
    score_yes_when: |
      Every turn surfaces 0 or 1 explicit ask. Implicit micro-asks
      ("type 'yes' to continue") count toward the cap. The first-contact
      welcome's "or type 'what else can you do?' for the verb list" is
      an escape hatch, not a second decision — still scores yes.
    score_no_when: |
      Any turn presents 2+ choices that aren't trivially-related. Note:
      first-contact Branch B (gstack missing) bundles "run /mur scan"
      AND "install gstack via this curl one-liner" — that's 2 distinct
      asks in one screen. Branch A (gstack present) is clean.

  - id: 2
    short: "Whole arc named upfront"
    grading: binary
    description: |
      The first-contact welcome turn names every phase the user is
      about to walk through, with rough time estimate. The user
      finishes turn 1 knowing the *shape* of the experience.
    score_yes_when: |
      The welcome screen names all three canonical phases — **scan,
      connect, digest** — and signals optionality. Both first-contact
      branches in upstream's SKILL.md do this.
    score_no_when: |
      Welcome only says "want me to scan?" without naming what comes
      after.

  - id: 3
    short: "Wow before ask"
    grading: 0-3
    description: |
      Ratio of "value demonstrated" to "asks made" before the first
      paid moment. The first paid moment in Mur is the digest's
      one-free-per-day fire (or any subsequent paid digest / install).
      Free wows that count: scan findings shown, connect bonus credit,
      app-sweep ("I noticed you have X"), Day-0 backfill briefing.
    score_3_when: |
      User sees ≥3 distinct value moments before any paid ask. In
      upstream's flow the natural wows are: first scan finding (Turn 3),
      bonus credit + app sweep (Turn 5), Day-0 briefing (Turn 6).
      Day-0 backfill is free, so paid asks come on day 2+.
    score_2_when: |
      ≥2 value moments before the first paid ask.
    score_1_when: |
      Exactly 1 value moment before the first paid ask.
    score_0_when: |
      Onboarding asks for a credit card / paid digest / install before
      showing any value.

  - id: 4
    short: "Consent is reversible somewhere obvious"
    grading: binary
    description: |
      Every consent the user grants during onboarding is reversible
      via a surface the user knows or can find easily. The web
      dashboard at usemur.dev counts. OAuth provider UIs (GitHub App
      revoke, Composio account revoke) count. Inline revoke prose in
      every prompt is NOT required — that's noise during onboarding.
    score_yes_when: |
      Scan writes `.murmur/consents.json` (user-editable). OAuth
      grants are revocable via usemur.dev/dashboard/vault and the
      provider's own UI. Paid digest mode bounds spend per-fire and
      per-day.
    score_no_when: |
      A consent is granted with no revocation path anywhere — local
      file, web dashboard, OR provider UI. (Should not happen in
      upstream's flow; flag if found.)

  - id: 5
    short: "Signal-to-suggestion specificity"
    grading: 0-3
    description: |
      Every surfaced item (scan finding, connect suggestion, digest
      pillar item) cites a concrete signal. "Generic match" = 0.
      "We saw <specific thing>" with the thing rendered = 3.
    score_3_when: |
      Every scan finding cites a file/commit/import. Connect suggestion
      names the specific app from scan output. Digest items "cite every
      claim" per digest.md hard contract.
    score_2_when: |
      Most items cite a signal; a few are generic.
    score_0_when: |
      Surfaced items don't cite any repo signal. (Should never happen
      in upstream's flow — `prompts/scan.md` "Cite every claim" is a
      hard contract.)

  - id: 6
    short: "Wow latency (turns to four-pillar sweep)"
    grading: 0-3
    description: |
      Number of turns from the first-contact welcome to the
      four-pillar initial sweep landing. The sweep is the first
      wow — the user feels what happened, sees their product
      reflected, sees collaborators acknowledged, sees grounded
      findings, and sees what unlocks next. Lower is better.
    score_3_when: |
      Sweep lands at turn 2: welcome → /mur scan → sweep. The
      post-four-pillar target.
    score_2_when: |
      3 turns to sweep (an intermediate consent or confirmation
      step didn't get absorbed into the welcome).
    score_1_when: |
      4 turns to sweep.
    score_0_when: |
      Sweep doesn't fire or takes 5+ turns.
    note: |
      Reframed twice — originally turns-to-digest-fire (H6=1 floor
      due to OAuth + 90s backfill), then turns-to-plan-menu (H6=3
      floor at 4 turns), now turns-to-four-pillar-sweep (H6=3 floor
      at 2 turns). Each reframe pulls the wow earlier.

      The plan-of-action menu (post-connect) and the digest are
      separate wow moments downstream; H6 specifically measures
      the FIRST wow (the local-only sweep).

  - id: 9
    short: "Recommend propose breadth"
    grading: 0-3
    description: |
      When recommend's `propose` move fires (after a `light` opener
      or in response to a probe), do the surfaced candidates span
      the major paths the user's stack opens up — security-audit,
      automate (marquee), automate (co-designed for stack gap),
      catalog browse, daily digest, publish, gstack hand-off — when
      their trigger conditions are met? The recommend phase replaces
      the prior plan-of-action menu (#170): cap is now ≤3 candidates
      per propose turn, at most 2 co-designed, at least 1 marquee.
      H9 measures whether what gets surfaced ADAPTS to the user's
      actual stack vs. always proposing the same kind of thing.
    score_3_when: |
      Across the recommend session (opening light + any propose
      turns), candidates span the user's relevant paths. A
      pre-product persona sees publish + digest + co-designed
      utility-watcher (NOT padded with security-audit). An
      indie-stripe sees security-audit + reviewer-marquee +
      MRR-watcher co-design.
    score_2_when: |
      Most relevant paths surface. 1–2 obvious paths missing
      that the stack signals would have justified.
    score_1_when: |
      Recommend keeps proposing the same flavor (e.g. only
      digest variants, or only marquee flows) despite the
      stack opening up other paths.
    score_0_when: |
      Recommend proposes the same single candidate every turn,
      OR pads with paths the stack signals don't justify
      (security-audit for a user with no payment surface).
    note: |
      H9 was originally "Plan-of-action breadth" (#163). Reframed
      for the recommend phase (#190+): the 3–5-item menu became
      a multi-turn conversation with ≤3-cap-per-turn proposes.
      Same intent — measure adaptive breadth — applied to the new
      surface. A flow that opens with light → user accepts → install
      and never proposes more than 1 candidate is fine for that
      user (the 1 fit perfectly). H9 only fires when the user
      probes or rejects the opener and recommend has to propose
      multiples — at that point breadth must show up.

  - id: 10
    short: "Recommend propose grounding"
    grading: 0-3
    description: |
      Is each candidate that recommend proposes cited with a
      specific signal that justifies it for THIS user? Generic
      proposals ("you might want to set up monitoring") fail this;
      signal-grounded proposals ("MRR-watcher — you have 47
      customers on Stripe and Sentry deployed; this connects them")
      pass. Mirrors H5 at the propose-move level.
    score_3_when: |
      Every proposed candidate names a file / PR / SDK / customer-
      count / signal. Marquee and co-designed candidates are
      indistinguishable in grounding (provenance neutrality).
      The user can verify why each appeared without leaving the
      conversation.
    score_2_when: |
      Most candidates cite a signal. 1–2 are generic
      ("the catalog has a few things for your stack").
    score_1_when: |
      Half the candidates are generic.
    score_0_when: |
      Candidates read like a static product menu, not a curated
      proposal grounded in scan + connections.
    note: |
      H10 was originally "Plan-of-action grounding" (#163).
      Reframed for the recommend phase. Specifically protects
      against co-designed candidates being SOFTER than marquee
      candidates ("here's one I made up for you" with no signal
      tie). Provenance neutrality requires both kinds carry the
      same evidence weight.

  - id: 7
    short: "Drop-off recoverability"
    grading: binary
    description: |
      If the user kills the session mid-onboarding, the next
      invocation can resume from the same step without losing state
      or re-asking already-answered questions.
    score_yes_when: |
      `.murmur/scan.json` carries `progress` for "what else?". State
      `~/.murmur/state.json` carries projectId. `.murmur/consents.json`
      carries scan + gh-probe consents. After a scan, "/mur" without
      a verb closes the loop with the next step (connect) rather than
      restarting onboarding.
    score_no_when: |
      Resume re-asks questions the user already answered, or skips to
      the wrong step. (In upstream's flow this would only happen if
      `.murmur/` got deleted between sessions.)

  - id: 8
    short: "Business recognition / chief-of-staff voice"
    grading: 0-3
    description: |
      Does Mur sound like a chief-of-staff who *gets* the user's
      business, or like a code parser? A chief-of-staff names the
      business shape (B2B SaaS / consumer / dev tool / utility
      script), references the stack signals (Stripe live, no LLM
      observability, Sentry deployed), and echoes that recognition
      across multiple turns. A code parser just lists what was
      detected.
    score_3_when: |
      Business shape named explicitly in scan output ("Looks like:
      B2B SaaS, Stripe live, ~12 PRs/week, Sentry deployed — past
      PMF and shipping fast"). Product summary echoed in connect's
      auto-fire surface line ("I can watch your Notion-clone for
      engineering teams now…"). Digest header includes product
      summary parenthetical. The user feels Mur synthesized
      something rather than parroting fields.
    score_2_when: |
      Business shape named once (e.g. in scan output) but not
      echoed in connect or digest. Or product summary echoed but
      no broader business profile composed.
    score_1_when: |
      Product summary only (one-line description), no business
      shape inferred. The user sees "Notion-clone with realtime
      collab" but no read on whether it's a side project or live
      product.
    score_0_when: |
      No business or product framing at all — just stack slot
      counts and findings. Mur sounds like a linter, not a
      cofounder.
    note: |
      H8 catches a failure mode H1–H7 miss: a flow can score well
      on per-turn discipline (one decision per turn, wow before ask)
      and per-item specificity (every finding grounded) while still
      feeling impersonal. H8 measures whether Mur sounds like a
      cofounder at the *flow* level, not just the item level.

      H5 is per-item ("does each finding cite a signal?"); H8 is
      per-flow ("does Mur sound like it gets the user's business?").
      A flow can score H5=3 and H8=1 — that's the gap H8 catches.

  - id: 11
    short: "Four-pillar structure"
    grading: 0-3
    description: |
      Does scan.md's initial sweep (Step 2) produce all four
      pillars in order: *what you're building*, *who's working on
      it with you*, *what we noticed*, *what we can connect to*?
      Each pillar should be honestly populated or honestly omitted
      (never padded, never silently missing). The four-pillar
      shape is the chief-of-staff briefing the user expects on
      first scan — anything less is a regression to the prior
      single-finding lead.
    score_3_when: |
      All four pillars render honestly. Empty pillars are dropped
      cleanly (e.g. "Who's working on it with you" omitted when
      the user is solo and there's nothing meaningful to say
      beyond "just you"). The forward-looking note ("after you
      connect, this expands to your customers + teams") fires in
      the "Who" pillar where present.
    score_2_when: |
      Three of four pillars render. The missing one is dropped
      sensibly (not by accident).
    score_1_when: |
      Two pillars render. Output regresses toward the old single-
      finding lead.
    score_0_when: |
      One pillar or fewer. Output is a flat list of findings, not
      a structured chief-of-staff briefing.
    note: |
      H11 catches the failure mode the original eval missed:
      individual lines could pass H5 (signal specificity) and H8
      (chief-of-staff voice) while the OUTPUT STRUCTURE was a
      single-finding lead with a digest preview tacked on. The
      four-pillar shape forces the structural change.

  - id: 12
    short: "Primary-CTA isolation"
    grading: binary
    description: |
      Does the scan output have exactly one primary CTA (the
      connect-deeper ask) with all other actions clearly framed
      as secondary sub-CTAs ("Try: `/mur security-audit`",
      "show me <file>", etc.)?
    score_yes_when: |
      The connect-deeper ask sits below a separator line and uses
      mechanism-honest framing ("I need server-side read access on
      the tools above"). Sub-CTAs in the "What we noticed" pillar
      use "Try:" prefix and a single verb command. No competing
      pitch (digest preview, automation upsell) crowds the primary
      CTA.
    score_no_when: |
      Multiple CTAs presented at parity (e.g. the old screenshot
      where a predictive digest preview and a connect ask
      competed for attention in the same screen). Or the connect
      ask uses generic "Want to connect?" copy that doesn't name
      what unlocks.

  - id: 13
    short: "Pre-connect / post-connect separation"
    grading: binary
    description: |
      Pre-connect output (first scan, no `hasMinConnections: true`
      in HEARTBEAT) shows local-only data + the connect-deeper
      ask. Post-connect output (after `/mur connect github`) shows
      a deeper rescan with external data + routes to plan.md.
      These are two distinct moments — bundling them creates the
      "two things smashed into one" failure.
    score_yes_when: |
      Pre-connect: scan output is local-only diagnostic +
      connect-deeper ask. No predictive digest preview, no plan-
      menu, no automation pitch crammed in. Post-connect: scan
      re-fires with external data populated under
      `scan.json.external.*`, and connect.md routes to plan.md
      after a brief "now I can also see X" delta line.
    score_no_when: |
      Pre-connect output includes content that belongs post-
      connect (e.g. predictive digest preview pretending to show
      tomorrow's briefing, or an automation pitch). Or post-
      connect ignores the new external data and just routes to
      plan.md without a delta.
    note: |
      H13 was added after the actual user flagged the screenshot
      as "two things smashed into one." The eval's previous
      heuristics (H1 with too-loose ask-counting, H8 measuring
      voice not structure) didn't catch this. H13 makes
      separation explicit.

  - id: 14
    short: "Helpful no-repo handling"
    grading: binary
    description: |
      When `/mur scan` (or `/mur connect <source>`) fires from a
      non-repo location (`$HOME`, `~/Desktop`, `~/Documents`,
      `~/Downloads`, or any folder where `git rev-parse
      --show-toplevel` fails), Mur surfaces the helpful 3-option
      ask documented in `prompts/scan.md` "Helpful no-repo ask"
      (connect / find / type-a-path), with **connect as option 1**.
      No silent fallback to scanning whatever's in cwd. No "cd
      into a repo first" jargon. No "come back when you have a
      project" / "Mur isn't for you yet" dismissal copy.
    score_yes_when: |
      Pre-check fires before §2.0 disclosure; agent renders the
      3-option ask with connect first; `_bootstrap.md` lets no-
      repo connects through (server falls back to primary; no
      project gets registered for `~/`; no refuse).
    score_no_when: |
      Any of: (a) scan silently scans home / Desktop / etc.
      without asking, (b) refuse + jargon copy ("cd into a
      project"), (c) dismissive copy ("come back later" / "Mur
      isn't for you"), (d) connect from `~/` fails because
      bootstrap refuses.
    note: |
      H14 was added after a real bug: `/mur scan` from `~/`
      walked home-dir contents with no warning and wrote
      scan.json under `~/.murmur/`. An external reviewer
      suggested "tell the user to cd into a project first" —
      fixing the silent-scan failure mode but with developer-
      jargon copy that excludes Claude Code users unfamiliar
      with shell. The right fix leads with **connect** (the
      universal path that works for non-developers too) and
      never dismisses the user.

      Scoring `desktop-user` persona: H14 is now the relevant
      heuristic. The welcome no longer "exits"; it routes
      through the same helpful no-repo ask.

  - id: 15
    short: "Recommend opening shape"
    grading: binary
    description: |
      Does recommend.md open with a `light` move — one grounded
      proposed candidate plus an explicit invitation to probe /
      propose-your-own / co-design / defer — instead of a 3–5-item
      curated menu? The recommend phase replaces the prior
      plan-of-action menu surface (#170). Menus optimize for
      "pick from what we offer." Light-move openers optimize for
      "describe what you need, including things we wouldn't have
      thought to put on a menu." That's the long-tail unlock.
    score_yes_when: |
      First post-connect message from recommend is a single
      grounded propose ("Given <signal>, my read is <flow> would
      be useful — want me to install it, dig into something else,
      or describe what you'd actually want?"). Probe / co-design
      / defer paths are mentioned as available. No numbered menu.
    score_no_when: |
      Recommend opens with "Here are 3–5 things you can do" /
      a numbered menu / a fork-of-options. Even if every option
      is grounded, menu-shaped opens push the user away from
      describing what they need.
    note: |
      H15 makes the recommend phase's structural commitment
      explicit. The plan-of-action menu (#170) was the right
      shape one iteration ago — it cleared "auto-fire the
      digest" failure but kept the user in pick-from-our-list
      mode. The recommend phase replaces that with a chief-of-
      staff conversation. H15 enforces the surface change.

      Edge case: if the user opens with "what should I do next?"
      (legacy plan phrasing) recommend can still respond with a
      light propose. The acknowledgement line ("plan is the
      recommend conversation now") is permitted but doesn't
      excuse a menu.

  - id: 16
    short: "Marquee + co-designed mix discipline"
    grading: 0-3
    description: |
      When recommend's `propose` move surfaces multiple candidates,
      does the mix obey the rule of three: ≤3 candidates total,
      ≤2 co-designed, ≥1 marquee? Marquee = entries from
      `registry/flows/*.yaml` (recommend-matcher.md substrate).
      Co-designed = constructed in conversation from scan + user
      need. Provenance neutrality: candidates render in the same
      shape regardless of source — the user shouldn't be able to
      tell which is which from format alone.
    score_3_when: |
      Mix obeys all three rules: ≤3 cap, ≤2 co-designed,
      ≥1 marquee (or, in the edge case where zero marquee fit,
      explicit note "no marquee flow fits — these are all
      co-designed"). Surface format is identical for both kinds.
    score_2_when: |
      Mix obeys cap and co-designed limit but doesn't surface
      a marquee where one would fit (substrate filtered too
      aggressively). Or surfaces a marquee but tags it visibly
      as "from our catalog" while co-designed gets no equivalent
      label — provenance leaks through framing.
    score_1_when: |
      Cap exceeded (4+ candidates) OR all co-designed despite
      marquee fits being available. The user gets either too
      many choices or a ground-everything-from-scratch feel
      that ignores the substrate.
    score_0_when: |
      All marquee (recommend reverts to old recommend-matcher
      behavior, no co-design surface fires) OR all co-designed
      with no marquee anywhere in the session despite obvious
      fits. The phase isn't earning its name.
    note: |
      H16 protects the recommend phase's core architectural
      commitment: long-tail unlock requires co-design, but
      co-design without marquee anchors becomes "Mur invents
      flows from thin air" — losing the substrate's quality
      bar. The mix rule is the constitutional check.

      If the user explicitly said "no marquee, build me
      something custom," all-co-designed is correct and
      H16 still scores 3 (rule-of-three preserved with the
      edge-case note).

  - id: 17
    short: "Local-install render-confirm-revoke"
    grading: binary
    description: |
      When recommend's `install` move emits any local artifact
      (cron entry, launchd plist, GitHub Actions workflow, gstack-
      skill file), does it follow the render-confirm-revoke
      contract: render the exact diff/file content, ask for
      explicit confirmation, register the install in
      `.murmur/installs.jsonl` for `/mur uninstall <slug>`?
      Remote installs (TEE-hosted) bypass this — they're owned by
      the server and revoked via dashboard. H17 only fires when
      a local artifact is created.
    score_yes_when: |
      Local install renders the artifact in full (file path +
      contents), waits for user confirm, writes the install to
      `.murmur/installs.jsonl` with slug + artifact path + ts +
      revoke-instructions. `/mur uninstall <slug>` removes the
      artifact and the registry entry.
    score_no_when: |
      Any of: artifact written without rendering full content
      first, no confirm step, no installs.jsonl entry, or
      `/mur uninstall <slug>` not honored. Silent local writes
      under user $HOME are the failure mode H17 catches.
    note: |
      H17 was added with the recommend phase. The remote
      substrate (FlowState rows in TEE) already had a clear
      revoke surface. Local installs are powerful — cron and
      launchd write to user $HOME and run on schedule — but
      have historically been the failure mode where automation
      tools accumulate cruft the user can't audit. Render-
      confirm-revoke makes the local path safe to use without
      the audit problem.

      Personas where H17 is n/a: the persona's recommend
      session ended without an install, OR install was remote
      (FlowState only). Mark `n/a` with reason in evidence.

# Acceptance criteria
acceptance:
  ship_when: |
    For every canonical persona in evals/personas/:
    - Average score across all 17 heuristics (in-scope for
      that persona) ≥ 2.5
    - No heuristic scores 0
    - All binary heuristics (1, 2, 4, 7, 12, 13, 14, 15, 17)
      score "yes" (where in-scope; H14 is n/a for in-repo
      personas, H17 is n/a when no local install fires)
    - Binary "yes" normalized as 3 for averaging
